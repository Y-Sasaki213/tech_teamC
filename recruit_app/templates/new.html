{% extends "base.html" %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
{% endblock %}

{% block content %}
<h2>候補者 新規登録</h2>

<form class="form-card" action="{{ url_for('create_candidate') }}" method="POST">

  <h3>基本情報</h3>

  <label>採用者氏名</label>
  <input type="text" name="name" required>

  <label>担当</label>
  <input type="text" name="owner">

  <label>連絡ステータス</label>
  <select name="contact_status">
    <option>学生返答待ち</option>
    <option>面接官の返答待ち</option>
    <option selected>未連絡</option>
    <option>保留</option>
    <option>お見送り</option>
    <option>内定承諾</option>
    <option>辞退</option>
    <option>その他</option>
  </select>

  <h3>初期フェーズ</h3>

  <label>カジュアル面談 / 説明会 担当者名</label>
  <input type="text" name="casual_event_staff">

  <label>書類選考</label>
  <select name="document_screening">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>リマインド</label>
  <select name="initial_remind">
    <option>未済</option>
    <option>済</option>
  </select>

  <h3>1次面接</h3>

  <label>実施日</label>
  <input type="date" name="first_interview_date">

  <label>担当者</label>
  <input type="text" name="first_interviewer">

  <label>座談会</label>
  <input type="text" name="first_meeting">

  <label>TEL</label>
  <select name="first_tel">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>リマインド</label>
  <select name="first_remind">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>実施時期</label>
  <input type="text" name="first_period" placeholder="例：6月中旬">

  <h3>2次面接</h3>

  <label>実施日</label>
  <input type="date" name="second_interview_date">

  <label>担当者</label>
  <input type="text" name="second_interviewer">

  <label>TEL</label>
  <select name="second_tel">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>リマインド</label>
  <select name="second_remind">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>成績証明</label>
  <select name="transcript">
    <option>未済</option>
    <option>済</option>
  </select>

  <label>実施時期</label>
  <input type="text" name="second_period" placeholder="例：7月上旬">

  <h3>最終フェーズ</h3>

  <label>最終面接</label>
  <input type="text" name="final_interview">

  <label>ピザパ予定</label>
  <input type="date" name="pizza_party_plan">

  <label>ピザパ参加</label>
  <select name="pizza_party_join">
    <option>未定</option>
    <option>参加</option>
    <option>不参加</option>
  </select>

  <label>承諾目安</label>
  <input type="text" name="acceptance_estimate">

  <label>内定〆切</label>
  <input type="date" name="offer_deadline">

  <button class="btn primary" type="submit">登録する</button>

</form>

{% endblock %}
